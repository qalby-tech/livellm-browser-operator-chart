apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "livellm-operator.fullname" . }}
  namespace: {{ include "livellm-operator.namespace" . }}
  labels:
    {{- include "livellm-operator.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.operator.replicas }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "livellm-operator.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "livellm-operator.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "livellm-operator.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: operator
          image: "{{ .Values.operator.image.repository }}:{{ include "livellm-operator.operatorTag" . }}"
          imagePullPolicy: {{ .Values.operator.image.pullPolicy }}
          args:
            - --leader-elect={{ .Values.operator.leaderElect }}
          env:
            - name: DEFAULT_BROWSER_IMAGE
              value: {{ include "livellm-operator.browserImage" . | quote }}
            - name: DEFAULT_BROWSER_PULL_POLICY
              value: {{ .Values.browser.image.pullPolicy | quote }}
            - name: DEFAULT_CONTROLLER_IMAGE
              value: {{ include "livellm-operator.controllerImage" . | quote }}
            - name: DEFAULT_CONTROLLER_PULL_POLICY
              value: {{ .Values.controller.image.pullPolicy | quote }}
            - name: REDIS_URL
              value: {{ include "livellm-operator.redisUrl" . | quote }}
          ports:
            - name: health
              containerPort: 8081
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.operator.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
