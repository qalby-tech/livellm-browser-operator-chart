{{- if .Values.installCRDs }}
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.1
  name: browsers.livellm.io
  labels:
    {{- include "livellm-operator.labels" . | nindent 4 }}
spec:
  group: livellm.io
  names:
    kind: Browser
    listKind: BrowserList
    plural: browsers
    shortNames:
      - br
    singular: browser
  scope: Namespaced
  versions:
    - additionalPrinterColumns:
        - jsonPath: .spec.profileUid
          name: Profile
          type: string
        - jsonPath: .status.phase
          name: Phase
          type: string
        - jsonPath: .status.wsUrl
          name: WS URL
          priority: 1
          type: string
        - jsonPath: .status.podIP
          name: Pod IP
          priority: 1
          type: string
        - jsonPath: .metadata.creationTimestamp
          name: Age
          type: date
      name: v1alpha1
      schema:
        openAPIV3Schema:
          description: |-
            Browser is the Schema for the browsers API.
            Each Browser CR results in one browser pod with a persistent profile.
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              description: BrowserSpec defines the desired state of a Browser instance.
              properties:
                cookies:
                  description: |-
                    Cookies loads a JSON array of cookies from a ConfigMap or Secret
                    and injects them into the browser at creation time.
                  properties:
                    configMapRef:
                      description: ConfigMapRef references a ConfigMap key containing a JSON array of cookies.
                      properties:
                        key:
                          default: cookies.json
                          description: Key within the resource. Defaults to "cookies.json".
                          type: string
                        name:
                          description: Name of the ConfigMap or Secret.
                          type: string
                      required:
                        - name
                      type: object
                    secretRef:
                      description: SecretRef references a Secret key containing a JSON array of cookies.
                      properties:
                        key:
                          default: cookies.json
                          description: Key within the resource. Defaults to "cookies.json".
                          type: string
                        name:
                          description: Name of the ConfigMap or Secret.
                          type: string
                      required:
                        - name
                      type: object
                  type: object
                extensions:
                  description: |-
                    Extensions is a list of Chrome Web Store extension IDs to install at creation time.
                    The launcher downloads and injects them into the profile before Chrome starts.
                  items:
                    type: string
                  type: array
                image:
                  description: |-
                    Image overrides the browser container image.
                    If empty, the operator uses its configured default (DEFAULT_BROWSER_IMAGE env var).
                  type: string
                profileUid:
                  description: |-
                    ProfileUID is the unique profile identifier used as browser_id in the controller.
                    Defaults to the CR name if empty.
                  type: string
                proxy:
                  description: |-
                    Proxy configures HTTP proxy for the browser.
                    Only applied when profileUid != "default" (operator creates a new browser via launcher API).
                  properties:
                    bypass:
                      description: Bypass is a comma-separated list of hosts to bypass.
                      type: string
                    password:
                      description: Password for proxy authentication.
                      type: string
                    server:
                      description: Server is the proxy URL (e.g. http://proxy:8080).
                      type: string
                    username:
                      description: Username for proxy authentication.
                      type: string
                  required:
                    - server
                  type: object
                reclaimPolicy:
                  default: Retain
                  description: |-
                    ReclaimPolicy determines what happens to the PVC when the Browser CR is deleted.
                    "Retain" (default) keeps profile data; "Delete" removes it.
                  enum:
                    - Retain
                    - Delete
                  type: string
                resources:
                  description: Resources defines CPU/memory requests and limits for the browser pod.
                  properties:
                    limits:
                      additionalProperties:
                        type: string
                      type: object
                    requests:
                      additionalProperties:
                        type: string
                      type: object
                  type: object
                shmSize:
                  default: 4Gi
                  description: ShmSize is the /dev/shm size for Chrome (e.g. "4Gi").
                  type: string
                storage:
                  default: 1Gi
                  description: Storage is the PVC size for profile data (e.g. "1Gi").
                  type: string
              required:
                - profileUid
              type: object
            status:
              description: BrowserStatus defines the observed state of a Browser.
              properties:
                cdpPort:
                  type: integer
                message:
                  type: string
                phase:
                  enum:
                    - Pending
                    - Creating
                    - Running
                    - Failed
                  type: string
                podIP:
                  type: string
                podName:
                  type: string
                wsEndpoint:
                  type: string
                wsUrl:
                  type: string
              type: object
          type: object
      served: true
      storage: true
      subresources:
        status: {}
{{- end }}
