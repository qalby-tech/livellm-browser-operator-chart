apiVersion: v2
name: livellm-browser-operator
description: Helm chart for the LiveLLM Browser Operator — manages Browser and Controller CRDs on Kubernetes
type: application

version: 0.1.1

# appVersion controls the browser image tag:
#   main:    "2.0.1"      → kamasalyamov/livellm-browser:2.0.1
#   develop: "dev-2.0.1"  → kamasalyamov/livellm-browser:dev-2.0.1
appVersion: "dev-2.0.1"

annotations:
  # controllerVersion controls the controller image tag:
  #   main:    "controller-2.0.1"      → kamasalyamov/livellm-browser:controller-2.0.1
  #   develop: "dev-controller-2.0.1"  → kamasalyamov/livellm-browser:dev-controller-2.0.1
  controllerVersion: "dev-controller-2.0.1"
