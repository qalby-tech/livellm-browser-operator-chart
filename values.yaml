# -- Operator deployment configuration
operator:
  image:
    repository: kamasalyamov/livellm-browser-operator
    # -- Tag defaults to Chart.Version if empty
    tag: ""
    pullPolicy: Always
  replicas: 1
  leaderElect: false
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 200m
      memory: 256Mi

# -- Browser image repository.
# The tag is derived automatically from Chart.AppVersion.
browser:
  image:
    repository: kamasalyamov/livellm-browser
    # -- Pull policy for browser pods. Options: Always, IfNotPresent, Never.
    pullPolicy: Always
  # -- Default environment variables injected into all browser pods.
  # Each entry is an object with `name` and `value` (or `valueFrom`).
  # NB: the operator deliberately does NOT set NODE_OPTIONS on browser pods —
  # the pod hosts Chrome itself, which needs the bulk of the memory budget.
  # Override here only if you really know you want to cap V8 heap.
  env: []

  # -- Default resource requests/limits for browser pods (per CR override
  # via spec.resources still wins). Map of "requests" / "limits" → cpu/memory.
  # Operator built-in fallback is: requests 500m/2Gi, limits 1/4Gi.
  resources: {}
  #  requests:
  #    cpu: "500m"
  #    memory: "2Gi"
  #  limits:
  #    cpu: "1"
  #    memory: "4Gi"

# -- Controller image repository.
# The tag is derived automatically from Chart.Annotations.controllerVersion
# (falls back to deriving from Chart.AppVersion if annotation is missing).
controller:
  image:
    repository: kamasalyamov/livellm-browser
    # -- Pull policy for controller pods. Options: Always, IfNotPresent, Never.
    pullPolicy: Always
  # -- Default environment variables injected into the controller pod.
  # Each entry is an object with `name` and `value` (or `valueFrom`).
  # NB: the operator auto-sets NODE_OPTIONS based on the pod memory limit
  # (min(limit/2, 4096) MiB, floored at 512 MiB). Override here only if
  # the auto-sized value is unsuitable.
  env: []
  #  - name: NODE_OPTIONS
  #    value: "--max-old-space-size=2048"

  # -- Default resource requests/limits for the controller pod (per CR override
  # via spec.resources still wins). Map of "requests" / "limits" → cpu/memory.
  # Operator built-in fallback is: requests 250m/512Mi, limits 500m/2Gi.
  resources: {}
  #  requests:
  #    cpu: "250m"
  #    memory: "1Gi"
  #  limits:
  #    cpu: "1"
  #    memory: "4Gi"

  # -- Max pages per browser before autoscaling triggers.
  # Only effective when autoscaleBrowser is true. Defaults to 50.
  maxPagesPerBrowser: 50

  # -- Enable automatic creation of new Browser CRs when
  # existing browsers reach maxPagesPerBrowser.
  autoscaleBrowser: false

  # -- Template for autoscaled Browser CRs. If empty, the operator
  # copies the spec from the first manually-defined Browser CR.
  autoscaleBrowserTemplate: {}
  #  resources:
  #    requests:
  #      cpu: "4"
  #      memory: "8Gi"
  #    limits:
  #      cpu: "4"
  #      memory: "8Gi"
  #  storage: "8Gi"
  #  shmSize: "8Gi"
  #  env:
  #    - name: NODE_OPTIONS
  #      value: "--max-old-space-size=6144"
  #  reclaimPolicy: Delete

# -- Namespace configuration
namespace:
  create: true
  name: livellm-system

# -- ServiceAccount configuration
serviceAccount:
  create: true
  name: livellm-operator
  annotations: {}

# -- Install CRDs as part of the chart. Set to false if you manage CRDs separately.
installCRDs: true

# -- Redis configuration for browser state management.
# If redis.enabled is true, a Redis instance is deployed alongside the operator.
# Set redis.enabled to false and provide redis.url to use an external Redis instance.
redis:
  enabled: true
  # -- External Redis URL. Ignored when redis.enabled is true.
  # When using the built-in Redis, the URL is auto-generated.
  url: ""
  image:
    repository: redis
    tag: 7-alpine
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

# -- Image pull secrets for the operator pod
imagePullSecrets: []

# -- Node selector for the operator pod
nodeSelector: {}

# -- Tolerations for the operator pod
tolerations: []

# -- Affinity rules for the operator pod
affinity: {}